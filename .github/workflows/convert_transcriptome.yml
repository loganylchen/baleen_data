name: Convert Genome to Transcriptome

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Ensembl reference files
        uses: actions/cache@v4
        with:
          path: |
            Homo_sapiens.GRCh38.104.gtf
            Homo_sapiens.GRCh38.dna.primary_assembly.fa
            Homo_sapiens.GRCh38.dna.primary_assembly.fa.fai
            transcriptome.fa
            transcriptome.fa.fai
          key: ensembl-104-gtf-genome-txome

      - name: Build Docker image
        run: docker build -f Dockerfile.analysis -t baleen-analysis .

      # --- Reorganize raw data ---
      - name: Reorganize m5C data
        run: |
          docker run --rm -v "${{ github.workspace }}:/data" \
            baleen-analysis python /data/reorganize_m5c.py

      - name: Reorganize pseudo-U data
        run: |
          docker run --rm -v "${{ github.workspace }}:/data" \
            baleen-analysis python /data/reorganize_pseudou.py

      # --- Convert genome → transcriptome ---
      - name: Convert m6A (hek293t)
        run: |
          docker run --rm -v "${{ github.workspace }}:/data" \
            baleen-analysis python /data/genome_to_transcriptome.py

      - name: Convert m5C and pseudo-U
        run: |
          docker run --rm -v "${{ github.workspace }}:/data" \
            baleen-analysis python /data/genome_to_transcriptome.py \
              --dirs hek293t/m5c hela/m5c hek293t/pseudo-u hela/pseudo-u a549/pseudo-u

      # --- Validate 5-mers ---
      - name: Validate 5-mers (m6A)
        run: |
          docker run --rm -v "${{ github.workspace }}:/data" \
            baleen-analysis python /data/validate_5mer.py

      - name: Validate 5-mers (m5C + pseudo-U)
        run: |
          docker run --rm -v "${{ github.workspace }}:/data" \
            baleen-analysis python /data/validate_5mer.py \
              --dirs hek293t/m5c hela/m5c hek293t/pseudo-u hela/pseudo-u a549/pseudo-u

      - name: Cross-validate 5-mers (m6A)
        run: |
          docker run --rm -v "${{ github.workspace }}:/data" \
            baleen-analysis python /data/validate_5mer_cross.py

      - name: Cross-validate 5-mers (m5C + pseudo-U)
        run: |
          docker run --rm -v "${{ github.workspace }}:/data" \
            baleen-analysis python /data/validate_5mer_cross.py \
              --dirs hek293t/m5c hela/m5c hek293t/pseudo-u hela/pseudo-u a549/pseudo-u

      - name: Fix file ownership
        run: sudo chown -R "$(id -u):$(id -g)" .

      - name: Commit output files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            hek293t/m6a/*_transcriptome.tsv \
            hek293t/m5c/*_genome.tsv hek293t/m5c/*_transcriptome.tsv \
            hela/m5c/*_genome.tsv hela/m5c/*_transcriptome.tsv \
            hek293t/pseudo-u/*_genome.tsv hek293t/pseudo-u/*_transcriptome.tsv \
            hela/pseudo-u/*_genome.tsv hela/pseudo-u/*_transcriptome.tsv \
            a549/pseudo-u/*_genome.tsv a549/pseudo-u/*_transcriptome.tsv
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update genome and transcriptome TSV files (automated)"
            git push
          fi
